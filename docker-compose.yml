version: '3.8'

services:
  # AntTP Service
  anttp:
    image: traktion/anttp:v0.22.4
    container_name: anttp
    restart: unless-stopped
    
    # OPTION A: Host network (recommended)
    network_mode: "host"
    
    # OPTION B: Bridge network with DNS fix
    # networks:
    #   - anttp-network
    # ports:
    #   - "18888:8080"
    
    environment:
      # Logging
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      
      # Network settings
      - ANTP_BIND_ADDRESS=0.0.0.0:18888
      - ANTP_CONNECTION_TIMEOUT=15
      - ANTP_BOOTSTRAP_TIMEOUT=10
      
      # Bootstrap configuration  
      - ANTP_BOOTSTRAP_MODE=auto
      - ANTP_ENABLE_PEER_DISCOVERY=true
      
      # Wallet (generate a test key)
      - ANTP_WALLET_PRIVATE_KEY=${ANTP_WALLET_KEY:-test-key-12345}
      
      # Debug
      - ANTP_NETWORK_DEBUG=true
      - ANTP_LOG_NETWORK_TRAFFIC=true
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Run with proper permissions
    user: "1000:1000"
    
    # Add capabilities if needed
    cap_add:
      - NET_ADMIN
      - NET_RAW
    
    # Optional: Add sysctls for network tuning
    sysctls:
      - net.core.somaxconn=1024
      - net.ipv4.tcp_syncookies=0

# Networks (if not using host mode)
networks:
  anttp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: br-anttp

