services:
  # AntTP - Autonomi HTTP Proxy
  anttp:
    image: traktion/anttp:latest
    container_name: anttp
    ports:
      - "18888:18888"
    command: >
      /usr/local/bin/anttp
      --listen-address 0.0.0.0:18888
      --download-threads 8
      --immutable-memory-cache-size 64
      --immutable-disk-cache-size 2048
      --cached-mutable-ttl 10
    networks:
      - autonomi-net
    restart: unless-stopped
    volumes:
      - anttp-cache:/tmp/anttp/cache

  # Python FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autonomi-backend
    ports:
      - "8000:8000"
    environment:
      - ANTTP_BASE_URL=http://anttp:18888
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    depends_on:
      - anttp
    networks:
      - autonomi-net
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # SvelteKit Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autonomi-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
      - VITE_ANTTP_BASE_URL=http://localhost:18888
    depends_on:
      - backend
    networks:
      - autonomi-net
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    restart: unless-stopped

networks:
  autonomi-net:
    driver: bridge

volumes:
  anttp-cache:
