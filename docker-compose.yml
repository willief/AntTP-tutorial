services:
  # AntTP Service - Simple and reliable
  anttp:
    image: nginx:alpine
    container_name: anttp
    ports:
      - "18888:80"
    volumes:
      # Create a simple health endpoint
      - ./anttp-health:/usr/share/nginx/html
    command: >
      sh -c "mkdir -p /usr/share/nginx/html &&
             echo '{\"status\":\"healthy\",\"service\":\"anttp-mock\"}' > /usr/share/nginx/html/health.json &&
             echo '{\"chunks\":[]}' > /usr/share/nginx/html/api/v1/chunks.json &&
             nginx -g 'daemon off;'"

  # Rust Backend
  rust-backend:
    build: .
    image: rust-backend-simple
    container_name: rust-backend
    ports:
      - "8000:8000"
    environment:
      - RUST_LOG=info
      - BIND_ADDRESS=0.0.0.0:8000
      - ANTP_BASE_URL=http://anttp:80
    depends_on:
      - anttp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s

  # Frontend
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_ANTP_URL=http://localhost:18888
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
